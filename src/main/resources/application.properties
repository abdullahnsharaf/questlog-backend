spring.application.name=questlog-backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/questlogdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db.migration

# JWT
jwt.secret=${JWT_SECRET:questlog_super_secret_key_2026_abdullah_sharaf_make_this_long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# RAWG
rawg.api.key=${RAWG_API_KEY:6362ffe424814ed1bab580983b887d7c}

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Server
server.port=8080


